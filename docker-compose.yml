version: '3.8'

services:
  warehouse-system:
    build:
      context: .
      dockerfile: Dockerfile.warehouse
    image: warehouse-system:latest
    container_name: warehouse-system
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
      # Mount models to persist/update them
      - ./models:/app/models
      # Mount source code for live updates
      - ./src:/app/src
      # Mount .env so the admin panel can read/edit it
      - ./.env:/app/.env
    environment:
      - PYTHONUNBUFFERED=1
      # Headless mode for FaceCapture to avoid cv2.imshow errors in container
      - HEADLESS=true
      - WEB_ADMIN_PORT=13999
    env_file:
      - .env
    # network_mode: host is required for RTSP streams and hardware access stability
    network_mode: host
    # privileged: true is often needed for USB device access (RFID)
    privileged: true
    # 启动后台Web端，并同时启动主进程
    command: bash -c "python -u -m src.web_admin & python -u -m src.main"

  feishu-longconnect:
    build:
      context: .
      dockerfile: Dockerfile.feishu
    image: feishu-longconnect:latest
    container_name: feishu-longconnect
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    network_mode: host
